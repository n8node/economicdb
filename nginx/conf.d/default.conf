server {
    listen 80;
    server_name economicdb.com www.economicdb.com _;

    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /_next/static/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /app {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /adminus {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /wp-admin/    { proxy_pass http://wordpress; proxy_set_header Host $host; }
    location /wp-content/  { proxy_pass http://wordpress; proxy_set_header Host $host; }
    location /wp-includes/ { proxy_pass http://wordpress; proxy_set_header Host $host; }
    location /wp-json/     { proxy_pass http://wordpress; proxy_set_header Host $host; }
    location /wp-login.php { proxy_pass http://wordpress; proxy_set_header Host $host; }

    location / {
        proxy_pass http://wordpress;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
