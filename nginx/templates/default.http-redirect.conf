# Активируется ssl-init.sh после выпуска сертификата (копируется в conf.d/default.conf)

server {
    listen 80;
    server_name economicdb.com www.economicdb.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
