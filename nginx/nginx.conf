user nginx;
worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    sendfile on;
    # Close browser TCP sessions after each response. Long-lived keep-alive sockets
    # go stale on Windows/TUN adapters after deploy or idle and require netsh reset.
    keepalive_timeout 0;
    keepalive_requests 1;
    client_max_body_size 64M;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    include /etc/nginx/conf.d/*.conf;
}
